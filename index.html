<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KnowledgeFlow — 视频知识脑图平台</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- ═══ Header ═══ -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="5" r="2"/>
          <circle cx="5" cy="17" r="2"/>
          <circle cx="19" cy="17" r="2"/>
          <line x1="12" y1="7" x2="5" y2="15" stroke="#fff" stroke-width="1.5" fill="none"/>
          <line x1="12" y1="7" x2="19" y2="15" stroke="#fff" stroke-width="1.5" fill="none"/>
          <line x1="5" y1="17" x2="19" y2="17" stroke="#fff" stroke-width="1.5" fill="none"/>
        </svg>
      </div>
      KnowledgeFlow
    </div>

    <div class="header-center">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      AI与机器学习基础课程 &nbsp;/&nbsp; <span>第三章：神经网络原理</span>
    </div>

    <div class="header-right">
      <div class="role-toggle">
        <button class="role-btn active" onclick="setRole(this,'admin')">管理员</button>
        <button class="role-btn" onclick="setRole(this,'user')">普通用户</button>
      </div>

      <button class="hbtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        通知
      </button>

      <div class="avatar">李</div>
    </div>
  </header>

  <!-- ═══ Main ═══ -->
  <main>

    <!-- ─── Left Panel ─── -->
    <div class="left-panel">

      <div class="chapter-bar">
        <span>第三章</span>
        <span class="sep">›</span>
        <strong>3.2 反向传播算法详解</strong>
        <span class="sep">·</span>
        <span>共 5 节</span>
      </div>

      <!-- 视频区 -->
      <div class="video-area">
        <div class="video-placeholder">
          <div class="play-ring">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
          <div class="video-meta">
            <strong>3.2 反向传播算法详解</strong>
            讲师：张教授 &nbsp;·&nbsp; 时长 45:00
          </div>
        </div>

        <div class="progress-area">
          <div class="time-row">
            <span>15:18</span>
            <span>45:00</span>
          </div>
          <div class="track">
            <div class="track-fill"></div>
            <div class="markers">
              <div class="marker" style="left:8%"></div>
              <div class="marker" style="left:22%"></div>
              <div class="marker" style="left:34%"></div>
              <div class="marker" style="left:51%"></div>
              <div class="marker" style="left:67%"></div>
              <div class="marker" style="left:81%"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 控制栏 -->
      <div class="controls">
        <button class="ctrl-btn" title="快退10秒">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
            <text x="8" y="16" font-size="7" fill="currentColor" stroke="none">10</text>
          </svg>
        </button>
        <button class="ctrl-btn play" title="播放">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
        <button class="ctrl-btn" title="快进10秒">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/>
          </svg>
        </button>

        <div class="ctrl-sep"></div>

        <button class="ctrl-btn" title="音量">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
        <div class="vol-wrap">
          <div class="vol-track"><div class="vol-fill"></div></div>
        </div>

        <div class="ctrl-sep"></div>

        <span class="speed-badge">1.0×</span>

        <div class="ctrl-right">
          <button class="ctrl-btn" title="字幕">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="7" width="20" height="15" rx="2"/><line x1="7" y1="12" x2="17" y2="12"/>
              <line x1="7" y1="16" x2="13" y2="16"/>
            </svg>
          </button>
          <button class="ctrl-btn" title="画质">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </button>
          <button class="ctrl-btn" title="全屏">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- ─── 弹幕 / 评论区 ─── -->
      <div class="danmu-area">
        <div class="danmu-header">
          <div class="danmu-title">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            时间线评论
            <span class="danmu-count">8 条</span>
          </div>
          <div class="danmu-filter">
            <button class="filter-btn active">全部</button>
            <button class="filter-btn">当前章节</button>
            <button class="filter-btn">我的</button>
          </div>
        </div>

        <div class="comment-list" id="commentList"></div>

        <div class="send-bar">
          <div class="send-top">
            <span>评论将绑定到</span>
            <span class="time-indicator">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              15:18
            </span>
            <span>节点</span>
          </div>
          <div class="send-row">
            <input class="send-input" type="text" placeholder="在此输入你的想法，与视频时刻绑定…" />
            <button class="send-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
              发送
            </button>
          </div>
        </div>
      </div>

    </div><!-- /left-panel -->

    <!-- ─── Right Panel ─── -->
    <div class="right-panel">
      <div class="mind-header">
        <div class="mind-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
          知识脑图
          <span class="ai-badge">✦ AI 生成</span>
        </div>
        <div class="mind-actions">
          <span id="adminTools" style="display:flex;gap:8px;">
            <button class="mind-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/>
                <line x1="8" y1="12" x2="16" y2="12"/>
              </svg>
              新增节点
            </button>
            <button class="mind-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              编辑
            </button>
          </span>
          <button class="mind-btn primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            AI 萃取知识点
          </button>
        </div>
      </div>

      <!-- 脑图画布 -->
      <div class="mind-canvas">
        <svg class="mind-svg-wrap" id="mindSvg" viewBox="0 0 700 520" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="gRoot" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#4F8EF7"/>
              <stop offset="100%" stop-color="#A78BFA"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- 连接线：根 → L1 左侧 -->
          <path d="M350,260 C290,260 250,155 220,145" fill="none" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity=".4"/>
          <path d="M350,260 C290,260 250,215 200,215" fill="none" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity=".4"/>
          <path d="M350,260 C290,260 250,275 200,290" fill="none" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity=".4"/>
          <path d="M350,260 C290,260 250,350 200,375" fill="none" stroke="#4F8EF7" stroke-width="1.5" stroke-opacity=".4"/>

          <!-- 连接线：根 → L1 右侧 -->
          <path d="M350,260 C410,260 450,145 490,140" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-opacity=".4"/>
          <path d="M350,260 C410,260 460,210 500,210" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-opacity=".4"/>
          <path d="M350,260 C410,260 460,290 490,300" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-opacity=".4"/>
          <path d="M350,260 C410,260 450,375 480,390" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-opacity=".4"/>

          <!-- 连接线：L1左 → L2 -->
          <path d="M200,215 C170,215 155,180 130,175" fill="none" stroke="#4F8EF7" stroke-width="1" stroke-opacity=".25"/>
          <path d="M200,215 C170,215 155,225 130,235" fill="none" stroke="#4F8EF7" stroke-width="1" stroke-opacity=".25"/>
          <path d="M200,290 C170,290 155,275 130,268" fill="none" stroke="#4F8EF7" stroke-width="1" stroke-opacity=".25"/>
          <path d="M200,290 C170,290 155,310 130,318" fill="none" stroke="#4F8EF7" stroke-width="1" stroke-opacity=".25"/>

          <!-- 连接线：L1右 → L2 -->
          <path d="M500,210 C530,210 545,195 570,188" fill="none" stroke="#A78BFA" stroke-width="1" stroke-opacity=".25"/>
          <path d="M500,210 C530,210 545,228 570,235" fill="none" stroke="#A78BFA" stroke-width="1" stroke-opacity=".25"/>
          <path d="M490,300 C520,300 540,285 568,278" fill="none" stroke="#A78BFA" stroke-width="1" stroke-opacity=".25"/>
          <path d="M490,300 C520,300 540,315 568,322" fill="none" stroke="#A78BFA" stroke-width="1" stroke-opacity=".25"/>

          <!-- 根节点 -->
          <rect x="278" y="232" width="144" height="56" rx="12" fill="url(#gRoot)" filter="url(#glow)"/>
          <text x="350" y="258" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">反向传播算法</text>
          <text x="350" y="276" text-anchor="middle" fill="rgba(255,255,255,.65)" font-size="10">Backpropagation</text>

          <!-- L1 左侧节点 -->
          <rect x="138" y="127" width="108" height="36" rx="8" fill="#1A1F2E" stroke="#4F8EF7" stroke-width="1.2"/>
          <text x="192" y="149" text-anchor="middle" fill="#E8ECF4" font-size="12" font-weight="600">数学基础</text>

          <rect x="128" y="197" width="108" height="36" rx="8" fill="#1A1F2E" stroke="#4F8EF7" stroke-width="1.2"/>
          <text x="182" y="219" text-anchor="middle" fill="#E8ECF4" font-size="12" font-weight="600">网络结构</text>

          <rect x="128" y="272" width="108" height="36" rx="8" fill="#1A1F2E" stroke="#4F8EF7" stroke-width="1.2"/>
          <text x="182" y="294" text-anchor="middle" fill="#E8ECF4" font-size="12" font-weight="600">损失函数</text>

          <rect x="130" y="357" width="108" height="36" rx="8" fill="#1A1F2E" stroke="#4F8EF7" stroke-width="1.2"/>
          <text x="184" y="379" text-anchor="middle" fill="#E8ECF4" font-size="12" font-weight="600">优化算法</text>

          <!-- L1 右侧节点 -->
          <rect x="488" y="122" width="108" height="36" rx="8" fill="#1A1F2E" stroke="#A78BFA" stroke-width="1.2"/>
          <text x="542" y="144" text-anchor="middle" fill="#E8ECF4" font-size="12" font-weight="600">激活函数</text>

          <rect x="498" y="192" width="108" height="36" rx="8" fill="#1A1F2E" stroke="#A78BFA" stroke-width="1.2"/>
          <text x="552" y="214" text-anchor="middle" fill="#E8ECF4" font-size="12" font-weight="600">梯度计算</text>

          <rect x="488" y="282" width="108" height="36" rx="8" fill="#1A1F2E" stroke="#A78BFA" stroke-width="1.2"/>
          <text x="542" y="304" text-anchor="middle" fill="#E8ECF4" font-size="12" font-weight="600">权重更新</text>

          <rect x="478" y="372" width="108" height="36" rx="8" fill="#1A1F2E" stroke="#A78BFA" stroke-width="1.2"/>
          <text x="532" y="394" text-anchor="middle" fill="#E8ECF4" font-size="12" font-weight="600">实践应用</text>

          <!-- L2 叶节点 左侧 -->
          <rect x="42" y="162" width="80" height="28" rx="6" fill="#1A1F2E" stroke="#252A35" stroke-width="1"/>
          <text x="82" y="180" text-anchor="middle" fill="#6B7280" font-size="11">偏导数</text>

          <rect x="42" y="222" width="80" height="28" rx="6" fill="#1A1F2E" stroke="#252A35" stroke-width="1"/>
          <text x="82" y="240" text-anchor="middle" fill="#6B7280" font-size="11">链式法则</text>

          <rect x="42" y="256" width="80" height="28" rx="6" fill="#1A1F2E" stroke="#252A35" stroke-width="1"/>
          <text x="82" y="274" text-anchor="middle" fill="#6B7280" font-size="11">均方误差</text>

          <rect x="42" y="305" width="80" height="28" rx="6" fill="#1A1F2E" stroke="#252A35" stroke-width="1"/>
          <text x="82" y="323" text-anchor="middle" fill="#6B7280" font-size="11">交叉熵</text>

          <!-- L2 叶节点 右侧 -->
          <rect x="568" y="175" width="84" height="28" rx="6" fill="#1A1F2E" stroke="#252A35" stroke-width="1"/>
          <text x="610" y="193" text-anchor="middle" fill="#6B7280" font-size="11">ReLU</text>

          <rect x="568" y="222" width="84" height="28" rx="6" fill="#1A1F2E" stroke="#252A35" stroke-width="1"/>
          <text x="610" y="240" text-anchor="middle" fill="#6B7280" font-size="11">Sigmoid</text>

          <rect x="568" y="265" width="84" height="28" rx="6" fill="#1A1F2E" stroke="#252A35" stroke-width="1"/>
          <text x="610" y="283" text-anchor="middle" fill="#6B7280" font-size="11">梯度消失</text>

          <rect x="568" y="310" width="84" height="28" rx="6" fill="#1A1F2E" stroke="#252A35" stroke-width="1"/>
          <text x="610" y="328" text-anchor="middle" fill="#6B7280" font-size="11">学习率</text>
        </svg>

        <div class="mind-toolbar">
          <button class="tool-btn" title="放大">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
          <button class="tool-btn" title="缩小">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </button>
          <button class="tool-btn" title="重置视图">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
          </button>
          <button class="tool-btn" title="导出">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="statusbar">
        <div class="status-item">
          <div class="status-dot"></div>
          <span>已同步</span>
        </div>
        <div class="status-item">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          <span>上次 AI 生成：2 分钟前</span>
        </div>
        <div class="status-item" style="margin-left:auto">
          <span>节点数：12</span>
        </div>
      </div>
    </div><!-- /right-panel -->

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
